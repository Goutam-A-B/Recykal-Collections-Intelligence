name: Refresh collections outputs

on:
  workflow_dispatch:
  schedule:
    # Runs every 1 hour
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd python
          pip install -r requirements.txt

      - name: Fetch latest CSV exports (best-effort)
        run: |
          cd python
          python run.py fetch-data || true

      - name: Run pipeline (phase5)
        run: |
          cd python
          python run.py phase5

      - name: Commit refreshed deploy artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add only deploy artifacts
          git add deploy/

          # Exit cleanly if no changes
          git diff --cached --quiet && exit 0

          # Commit and push changes
          git commit -m "chore: refresh dashboard artifacts"
          git push
