name: Refresh collections outputs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: |
          cd python
          pip install -r requirements.txt

      - name: Fetch latest CSV exports (best-effort)
        run: |
          cd python
          python run.py fetch-data || echo "CSV fetch skipped — using existing data"

      - name: Ensure data files exist (fall back to sample data)
        run: |
          cd python
          if [ ! -f data/customers.csv ] || [ ! -f data/shipments.csv ] || [ ! -f data/payments.csv ]; then
            echo "Missing CSV files — generating sample data for pipeline run"
            python run.py sample-data
          fi

      - name: Run pipeline (phase5)
        run: |
          cd python
          python run.py phase5

      - name: Show operator summary
        run: cat python/output/phase5_operator_summary.md

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/
          git diff --cached --quiet || git commit -m "chore: refresh dashboard artifacts [skip ci]"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-outputs
          path: |
            python/output/
            deploy/
          retention-days: 30
